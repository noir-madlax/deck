<style>
/* ===== Aurelia Motors × Agent OS — Design Tokens ===== */
:root {
  color-scheme: light;
  /* Neutrals — warm off-whites */
  --bg: oklch(0.985 0.004 80);
  --bg-2: oklch(0.975 0.005 80);
  --bg-3: oklch(0.965 0.006 80);
  --surface: #ffffff;
  --panel: oklch(0.99 0.003 80);
  --hairline: oklch(0.91 0.006 80);
  --hairline-2: oklch(0.88 0.008 80);
  --ink: oklch(0.18 0.01 80);
  --ink-2: oklch(0.32 0.01 80);
  --ink-3: oklch(0.5 0.008 80);
  --ink-4: oklch(0.65 0.006 80);

  /* Accent — deep jade (Aurelia brand) */
  --accent: oklch(0.45 0.12 155);
  --accent-2: oklch(0.55 0.14 155);
  --accent-tint: oklch(0.95 0.03 155);
  --accent-line: oklch(0.85 0.06 155);

  /* Semantic */
  --warn: oklch(0.62 0.15 60);
  --warn-tint: oklch(0.96 0.04 60);
  --danger: oklch(0.55 0.18 25);
  --danger-tint: oklch(0.96 0.04 25);
  --info: oklch(0.55 0.12 245);
  --info-tint: oklch(0.96 0.03 245);

  /* Type */
  --f-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --f-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  --f-serif: 'Instrument Serif', 'Noto Serif SC', serif;

  /* Shadow */
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.04);
  --shadow-md: 0 4px 20px -4px oklch(0.2 0.01 80 / 0.08), 0 1px 2px oklch(0.2 0.01 80 / 0.04);
  --shadow-lg: 0 16px 40px -12px oklch(0.2 0.01 80 / 0.12), 0 2px 4px oklch(0.2 0.01 80 / 0.04);
  --shadow: var(--shadow-md);
  --focus-ring: oklch(0.9 0.005 80);

  --radius: 6px;
  --radius-lg: 10px;
  --report-deck-design-width: 1080px;
  --report-deck-design-height: calc(var(--report-deck-design-width) * 9 / 16);
  --report-deck-width: 1536px;
  --report-deck-height: 864px;
  --report-deck-export-scale: calc(var(--report-deck-width) / var(--report-deck-design-width));
}

:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: oklch(0.145 0.009 80);
  --bg-2: oklch(0.19 0.01 80);
  --bg-3: oklch(0.245 0.012 80);
  --surface: oklch(0.205 0.011 80);
  --panel: oklch(0.18 0.01 80);
  --hairline: oklch(0.31 0.012 80);
  --hairline-2: oklch(0.39 0.014 80);
  --ink: oklch(0.91 0.006 80);
  --ink-2: oklch(0.78 0.007 80);
  --ink-3: oklch(0.64 0.008 80);
  --ink-4: oklch(0.49 0.008 80);

  --accent: oklch(0.72 0.12 155);
  --accent-2: oklch(0.8 0.13 155);
  --accent-tint: oklch(0.25 0.045 155);
  --accent-line: oklch(0.43 0.07 155);

  --warn: oklch(0.78 0.13 68);
  --warn-tint: oklch(0.27 0.045 68);
  --danger: oklch(0.72 0.15 25);
  --danger-tint: oklch(0.26 0.055 25);
  --info: oklch(0.73 0.1 245);
  --info-tint: oklch(0.25 0.045 245);

  --shadow-sm: 0 1px 2px oklch(0.04 0.004 80 / 0.4);
  --shadow-md: 0 8px 24px -10px oklch(0.04 0.004 80 / 0.62), 0 1px 2px oklch(0.04 0.004 80 / 0.35);
  --shadow-lg: 0 22px 48px -16px oklch(0.04 0.004 80 / 0.72), 0 2px 6px oklch(0.04 0.004 80 / 0.42);
  --shadow: var(--shadow-md);
  --focus-ring: color-mix(in oklch, var(--accent) 22%, transparent);
}

:root[data-theme="dark"] .nav-item.active,
:root[data-theme="dark"] .workspace-choice-list button:hover,
:root[data-theme="dark"] .workspace-choice-list button.active {
  background: color-mix(in oklch, var(--accent) 18%, var(--surface));
  border-color: var(--accent-line);
  color: var(--ink);
  box-shadow: inset 0 0 0 1px var(--accent-line);
}

:root[data-theme="dark"] .nav-item.active .nav-num,
:root[data-theme="dark"] .nav-item.active .nav-badge {
  color: var(--accent);
}

:root[data-theme="dark"] .nav-item.active .nav-badge {
  background: var(--accent-tint);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: var(--f-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

body {
  transition: background 0.18s ease, color 0.18s ease;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
a { color: inherit; text-decoration: none; }
input, textarea { font: inherit; color: inherit; }

/* ===== App shell ===== */
.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100vh;
  min-height: 760px;
  width: 1440px;
}

.app.has-thinking {
  grid-template-columns: 220px 1fr 280px;
}
.app.sidebar-collapsed {
  grid-template-columns: 64px 1fr;
}
.app.sidebar-collapsed.has-thinking {
  grid-template-columns: 64px 1fr 280px;
}
.main { min-width: 0; }

/* Left sidebar */
.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--hairline);
  display: flex;
  flex-direction: column;
  padding: 14px 10px;
  gap: 2px;
  overflow: hidden;
}
.brand-mark {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 16px 8px;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 10px;
}
.sidebar-toggle {
  margin-left: auto;
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  border-radius: 4px;
  color: var(--ink-3);
}
.sidebar-toggle:hover { background: var(--bg-3); color: var(--ink); }
.sidebar.collapsed {
  padding: 14px 8px;
  align-items: center;
}
.sidebar.collapsed .brand-mark {
  flex-direction: column;
  padding: 6px 0 12px;
  gap: 8px;
  width: 100%;
}
.sidebar.collapsed .wordmark,
.sidebar.collapsed .nav-section-title,
.sidebar.collapsed .nav-item span:not(.nav-num):not(.nav-badge),
.sidebar.collapsed .nav-badge,
.sidebar.collapsed .sidebar-footer div:not(.avatar) {
  display: none !important;
}
.sidebar.collapsed .sidebar-toggle {
  margin-left: 0;
}
.sidebar.collapsed .nav-item {
  width: 42px;
  justify-content: center;
  gap: 0;
  padding: 8px 0;
}
.sidebar.collapsed .nav-item .nav-num {
  position: absolute;
  top: 2px;
  left: 4px;
  width: auto;
  font-size: 8px;
}
.sidebar.collapsed .sidebar-footer {
  justify-content: center;
  padding: 10px 0;
  width: 100%;
}
.brand-mark .logo {
  width: 26px; height: 26px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--f-serif);
  font-size: 16px;
  border-radius: 4px;
  letter-spacing: -0.02em;
}
.brand-mark .wordmark {
  display: flex; flex-direction: column; line-height: 1.15;
}
.brand-mark .wordmark b { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }
.brand-mark .wordmark small { font-family: var(--f-mono); font-size: 10px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.08em; }

.workspace-switcher {
  position: relative;
  padding: 0 2px 8px;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 2px;
}
.workspace-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border: 1px solid var(--hairline);
  background: var(--bg);
  color: var(--ink);
  border-radius: 6px;
  text-align: left;
}
.workspace-trigger:hover {
  background: var(--bg-3);
}
.workspace-trigger > span {
  min-width: 0;
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}
.workspace-trigger b {
  font-size: 12px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.workspace-trigger small {
  margin-top: 2px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-4);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.workspace-caret {
  margin-left: auto;
  color: var(--ink-4);
}
.workspace-popover {
  position: fixed;
  left: 224px;
  top: 86px;
  width: min(300px, calc(100vw - 240px));
  max-height: calc(100vh - 110px);
  overflow-y: auto;
  z-index: 80;
  background: var(--bg);
  border: 1px solid var(--hairline-2);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 10px;
}
.workspace-popover-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 8px;
}
.workspace-popover-head b {
  font-size: 12px;
}
.workspace-popover label {
  display: block;
  margin: 8px 0 5px;
  font: 600 10px/1 var(--f-mono);
  color: var(--ink-4);
  text-transform: uppercase;
  letter-spacing: 0;
}
.workspace-choice-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.workspace-choice-list button {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 8px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-2);
}
.workspace-choice-list button:hover,
.workspace-choice-list button.active {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--bg);
}
.workspace-choice-list button b {
  font-size: 12px;
  font-weight: 600;
}
.workspace-choice-list button small {
  font-family: var(--f-mono);
  font-size: 10px;
  color: inherit;
  opacity: 0.7;
}
.workspace-choice-list.compact {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.workspace-choice-list.compact button {
  min-height: 36px;
  justify-content: center;
}
.workspace-note {
  margin-top: 10px;
  padding: 8px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.sidebar.collapsed .workspace-switcher {
  width: 100%;
  padding: 0 0 8px;
}
.sidebar.collapsed .workspace-trigger {
  width: 42px;
  height: 42px;
  justify-content: center;
  padding: 0;
}
.sidebar.collapsed .workspace-trigger > span,
.sidebar.collapsed .workspace-caret {
  display: none;
}
.sidebar.collapsed .workspace-popover {
  left: 76px;
  top: 86px;
  width: min(300px, calc(100vw - 92px));
}

.nav-section-title {
  font-family: var(--f-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 12px 8px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius);
  color: var(--ink-2);
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-3); color: var(--ink); }
.nav-item.active { background: var(--ink); color: var(--bg); }
.nav-item.active .nav-num { color: oklch(0.7 0.002 80); }
.nav-item .nav-num {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-4);
  width: 14px;
}
.nav-item .nav-badge {
  margin-left: auto;
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg-3);
  border-radius: 10px;
  color: var(--ink-3);
}
.nav-item.active .nav-badge { background: color-mix(in oklch, var(--bg) 16%, var(--ink)); color: var(--bg); }

.sidebar-footer {
  margin-top: auto;
  padding: 10px 8px;
  border-top: 1px solid var(--hairline);
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}
.sidebar-footer small { color: var(--ink-4); font-family: var(--f-mono); font-size: 10px; }

/* Main surface */
.main {
  overflow-y: auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* Top bar */
.topbar {
  height: 44px;
  border-bottom: 1px solid var(--hairline);
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  color: var(--ink-3);
  font-size: 12px;
  font-family: var(--f-mono);
}
.breadcrumb .current { color: var(--ink); }
.breadcrumb .sep { color: var(--ink-4); }
.workspace-select {
  height: 28px;
  max-width: 180px;
  border: 1px solid var(--hairline);
  background: var(--bg-2);
  color: var(--ink);
  border-radius: 4px;
  padding: 0 24px 0 8px;
  font: 600 11px/1 var(--f-mono);
  letter-spacing: 0;
}
.workspace-select.product {
  max-width: 150px;
  color: var(--ink-2);
}
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--f-mono);
  color: var(--ink-3);
  white-space: nowrap;
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.chip.live .dot { background: var(--accent); animation: pulse 1.8s ease-in-out infinite; }
.chip.warn { color: var(--warn); border-color: color-mix(in oklch, var(--warn) 30%, var(--hairline)); background: var(--warn-tint); }
.chip.warn .dot { background: var(--warn); }
.chip.accent { color: var(--accent); border-color: var(--accent-line); background: var(--accent-tint); }
.chip.accent .dot { background: var(--accent); }
.chip.danger { color: var(--danger); border-color: color-mix(in oklch, var(--danger) 30%, var(--hairline)); background: var(--danger-tint); }
.chip.danger .dot { background: var(--danger); }
.chip.info { color: var(--info); border-color: color-mix(in oklch, var(--info) 30%, var(--hairline)); background: var(--info-tint); }
.chip.info .dot { background: var(--info); }
.chip.ghost { background: transparent; }
.chip.compact {
  gap: 4px;
  padding: 2px 6px;
  font-size: 10px;
}
.chip.compact .dot {
  width: 5px;
  height: 5px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--ink);
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover { background: var(--bg-2); border-color: var(--hairline-2); }
.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn.primary:hover { background: var(--ink-2); }
.btn.accent {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn.accent:hover { background: var(--accent-2); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--bg-3); }
.btn.sm { padding: 3px 8px; font-size: 11px; }
.btn:disabled { opacity: 0.6; cursor: wait; }

.btn-icon {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 4px;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--ink-2);
}
.btn-icon:hover { background: var(--bg-2); color: var(--ink); }
.btn-icon.theme-toggle {
  position: relative;
}
.btn-icon.theme-toggle.active {
  border-color: var(--accent-line);
  background: var(--accent-tint);
  color: var(--accent);
}

.kbd {
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-bottom-width: 2px;
  border-radius: 3px;
  color: var(--ink-3);
}

/* Page layout */
.page {
  padding: 20px 24px 40px;
  display: flex; flex-direction: column; gap: 20px;
  max-width: 1400px;
  width: 100%;
}
.page.wide { max-width: none; }
.page-header { display: flex; align-items: flex-start; gap: 16px; }
.page-header .heading h1 {
  margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
  font-family: var(--f-serif); font-weight: 400;
}
.page-header .heading h1 span.hl { font-style: italic; color: var(--accent); }
.page-header .heading p { margin: 4px 0 0; color: var(--ink-3); font-size: 13px; max-width: 70ch; }
.page-header .heading p.nowrap { max-width: none; white-space: nowrap; }
.page-header .actions { margin-left: auto; display: flex; align-items: flex-start; flex-wrap: wrap; gap: 8px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--hairline);
  display: flex; align-items: center; gap: 10px;
}
.card-header h3 {
  margin: 0; font-size: 12px; font-weight: 600;
  font-family: var(--f-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-2);
}
.card-header .count { color: var(--ink-4); font-family: var(--f-mono); font-size: 11px; }
.card-header .actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.card-body { padding: 14px; }
.card-body.flush { padding: 0; }

.brief-detail-header {
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
}
.brief-detail-title {
  flex: 1 1 220px;
  min-width: 180px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  word-break: keep-all;
}
.brief-detail-title-edit {
  flex: 1 1 260px;
  min-width: 260px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.brief-detail-title-edit .input {
  min-width: 0;
  height: 32px;
}
.brief-detail-meta {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 30px;
  white-space: nowrap;
}
.brief-detail-meta .tag,
.brief-detail-meta small {
  font-size: 10px;
  white-space: nowrap;
}
.brief-detail-actions {
  flex: 1 1 360px;
  min-width: 320px;
  justify-content: flex-end;
  flex-wrap: wrap;
}
.brief-detail-actions .btn,
.brief-detail-actions .chip,
.brief-detail-actions .input {
  flex: 0 0 auto;
  white-space: nowrap;
  word-break: keep-all;
}
.brief-detail-actions .input {
  width: 94px;
  height: 30px;
  font-size: 12px;
}
.brief-detail-actions .chip {
  font-size: 10px;
}

/* Grids */
.grid { display: grid; gap: 12px; }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-4 { grid-template-columns: repeat(4, 1fr); }

/* Metric card */
.metric {
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
  overflow: hidden;
}
.metric .label {
  font-family: var(--f-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ink-4);
}
.metric .label.metric-label-compact {

}
.monitor-unverified-main small {
  color: var(--ink-4);
  font: 500 11px/1.3 var(--f-mono);
}
.monitor-unverified-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.monitor-link-missing {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 0 8px;
  border: 1px dashed var(--hairline);
  border-radius: 6px;
  color: var(--ink-4);
  font: 600 11px/1 var(--f-sans);
  white-space: nowrap;
}
.monitor-sync-log-table {
  max-height: 520px;
  overflow: auto;
}
.monitor-sync-log-entry {
  border-bottom: 1px solid var(--hairline);
}
.monitor-sync-log-row {
  display: grid;
  grid-template-columns: minmax(150px, 1.2fr) 110px 110px 110px minmax(180px, 1fr);
  gap: 10px;
  align-items: center;
  padding: 10px 16px;
}
.monitor-sync-log-row.head {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--surface);
  color: var(--ink-4);
  font: 600 10px/1 var(--f-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.monitor-sync-log-row b {
  display: block;
  color: var(--ink);
  font: 650 12px/1.2 var(--f-sans);
}
.monitor-sync-log-row small {
  display: block;
  margin-top: 3px;
  color: var(--ink-4);
  font: 500 10px/1.25 var(--f-mono);
}
.monitor-sync-log-row p {
  margin: 0;
  min-width: 0;
  overflow: hidden;
  color: var(--ink-3);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 500 11px/1.35 var(--f-sans);
}
.monitor-sync-detail {
  padding: 0 16px 12px;
}
.monitor-sync-detail summary {
  display: inline-flex;
  align-items: center;
  height: 26px;
  cursor: pointer;
  color: var(--ink-3);
  font: 600 11px/1 var(--f-sans);
}
.monitor-sync-detail[open] summary {
  color: var(--ink);
}
.monitor-sync-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 8px;
}
.monitor-sync-detail-section {
  min-width: 0;
  overflow: hidden;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.monitor-sync-detail-section header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--hairline);
  background: var(--panel);
}
.monitor-sync-detail-section header b {
  color: var(--ink);
  font: 650 11px/1.2 var(--f-sans);
}
.monitor-sync-detail-section header span {
  color: var(--ink-4);
  font: 600 10px/1 var(--f-mono);
}
.monitor-sync-detail-list {
  max-height: 210px;
  overflow: auto;
}
.monitor-sync-detail-item {
  display: grid;
  gap: 4px;
  padding: 9px 10px;
  border-bottom: 1px solid var(--hairline);
}
.monitor-sync-detail-item:last-child {
  border-bottom: 0;
}
.monitor-sync-detail-item b,
.monitor-sync-detail-item a {
  min-width: 0;
  overflow: hidden;
  color: var(--ink);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 650 11px/1.3 var(--f-sans);
}
.monitor-sync-detail-item a {
  text-decoration: none;
}
.monitor-sync-detail-item a:hover {
  text-decoration: underline;
}
.monitor-sync-detail-item small {
  min-width: 0;
  overflow: hidden;
  color: var(--ink-4);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 500 10px/1.25 var(--f-sans);
}
.monitor-sync-detail-item p {
  display: -webkit-box;
  margin: 0;
  overflow: hidden;
  color: var(--ink-3);
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  font: 500 11px/1.35 var(--f-sans);
}
.monitor-sync-detail-metrics {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.monitor-sync-detail-metrics em {
  color: var(--ink-3);
  font: 600 10px/1.2 var(--f-mono);
  font-style: normal;
}
.monitor-sync-detail-empty {
  margin: 0;
  padding: 12px 10px;
  color: var(--ink-4);
  font: 500 11px/1.35 var(--f-sans);
}
.monitor-sync-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 78px;
  height: 24px;
  padding: 0 8px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--ink-3);
  font: 650 10px/1 var(--f-mono);
  white-space: nowrap;
}
.monitor-sync-pill.ok {
  border-color: var(--accent-line);
  background: var(--accent-tint);
  color: var(--accent);
}
.monitor-sync-pill.empty {
  color: var(--ink-4);
}
.monitor-sync-pill.error {
  border-color: color-mix(in oklch, var(--warn) 42%, var(--hairline));
  background: var(--warn-tint);
  color: var(--warn);
}
.monitor-sync-errors {
  display: grid;
  gap: 5px;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--hairline);
  background: var(--warn-tint);
}
.monitor-upload-dialog {
  width: min(860px, 100%);
}
.monitor-upload-body {
  display: grid;
  gap: 12px;
  max-height: min(640px, calc(100vh - 180px));
  overflow: auto;
  padding: 14px 16px;
}
.monitor-upload-drop {
  display: grid;
  place-items: center;
  gap: 6px;
  min-height: 118px;
  cursor: pointer;
  border: 1px dashed var(--accent-line);
  border-radius: 8px;
  background: var(--accent-tint);
  color: var(--ink);
  text-align: center;
}
.monitor-upload-drop span {
  font: 650 13px/1.2 var(--f-sans);
}
.monitor-upload-drop small {
  max-width: 520px;
  color: var(--ink-3);
  font: 500 12px/1.35 var(--f-sans);
}
.monitor-upload-drop input {
  display: none;
}
.monitor-upload-file-list,
.monitor-upload-warning {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.monitor-upload-file-list span,
.monitor-upload-warning span {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 8px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--panel);
  color: var(--ink-3);
  font: 500 11px/1 var(--f-sans);
}
.monitor-upload-warning span,
.monitor-upload-error {
  border-color: color-mix(in oklch, var(--warn) 42%, var(--hairline));
  background: var(--warn-tint);
  color: var(--warn);
}
.monitor-upload-error {
  padding: 8px 10px;
  border: 1px solid color-mix(in oklch, var(--warn) 42%, var(--hairline));
  border-radius: 6px;
  font: 600 12px/1.35 var(--f-sans);
}
.monitor-upload-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.monitor-upload-summary div {
  display: grid;
  gap: 4px;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--panel);
}
.monitor-upload-summary b {
  color: var(--accent);
  font: 700 18px/1 var(--f-sans);
}
.monitor-upload-summary span {
  color: var(--ink-4);
  font: 600 10px/1 var(--f-mono);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.monitor-upload-section {
  display: grid;
  gap: 8px;
}
.monitor-upload-section h3 {
  margin: 0;
  color: var(--ink);
  font: 650 13px/1.2 var(--f-sans);
}
.monitor-upload-conflicts,
.monitor-upload-update-list {
  display: grid;
  gap: 6px;
}
.monitor-upload-conflict,
.monitor-upload-update {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 160px;
  gap: 10px;
  align-items: center;
  padding: 9px 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--surface);
}
.monitor-upload-conflict b,
.monitor-upload-update span {
  display: block;
  min-width: 0;
  overflow: hidden;
  color: var(--ink);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 650 12px/1.25 var(--f-sans);
}
.monitor-upload-conflict p {
  margin: 3px 0;
  color: var(--ink-3);
  font: 500 11px/1.35 var(--f-sans);
}
.monitor-upload-conflict small {
  color: var(--ink-4);
  font: 500 10px/1.25 var(--f-mono);
}
.monitor-upload-conflict select {
  width: 100%;
  height: 30px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--surface);
  color: var(--ink);
  font: 600 12px/1 var(--f-sans);
}
.monitor-upload-update {
  grid-template-columns: minmax(0, 1fr) 104px 116px;
}
.monitor-upload-update b,
.monitor-upload-update em {
  color: var(--ink-3);
  font: 600 11px/1 var(--f-mono);
  font-style: normal;
  text-align: right;
}
.monitor-upload-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-top: 1px solid var(--hairline);
  background: var(--panel);
}
.monitor-upload-footer span {
  color: var(--ink-3);
  font: 500 12px/1.35 var(--f-sans);
}
.monitor-empty-note {
  padding: 10px 14px;
  border-top: 1px solid var(--hairline);
  color: var(--ink-4);
  font: 500 10px/1.4 var(--f-mono);
  background: var(--warn-tint);
}
.monitor-empty-note.inline {
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
}
.monitor-side-rail {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.monitor-risk-hero {
  border-color: color-mix(in oklch, var(--danger) 32%, var(--hairline));
  background: linear-gradient(180deg, var(--danger-tint), var(--surface) 72%);
}
.monitor-risk-copy {
  padding: 12px 0 11px;
}
.monitor-risk-copy b {
  color: var(--danger);
  font: 650 14px/1.2 var(--f-sans);
}
.monitor-risk-copy p {
  margin: 7px 0 7px;
  color: var(--ink-2);
  font-size: 13px;
  line-height: 1.58;
}
.monitor-risk-copy .monitor-translation-block {
  padding: 8px 9px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.5;
}
.monitor-action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.monitor-comment-stream {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 236px;
  overflow: auto;
}
.monitor-comment-panel .monitor-comment-stream,
.monitor-comment-stream.expanded {
  gap: 8px;
  max-height: 640px;
  padding: 12px;
}
.monitor-comment-topic-strip {
  display: flex;
  gap: 6px;
  padding: 10px 12px 0;
  overflow-x: auto;
}
.monitor-comment-topic-strip button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-width: max-content;
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-3);
  font: 600 11px/1 var(--f-sans);
}
.monitor-comment-topic-strip button.active {
  border-color: var(--accent-line);
  background: var(--accent-tint);
  color: var(--ink);
}
.monitor-comment-topic-strip b {
  color: var(--ink-4);
  font: 600 10px/1 var(--f-mono);
}
.monitor-comment-stream button {
  display: grid;
  grid-template-columns: 6px minmax(0, 1fr) 44px;
  gap: 8px;
  align-items: center;
  padding: 8px 9px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  text-align: left;
}
.monitor-comment-stream.expanded button {
  grid-template-columns: 6px minmax(0, 1fr) 52px;
}
.monitor-comment-stream button.active {
  border-color: var(--accent-line);
  background: var(--accent-tint);
}
.monitor-sentiment-bar {
  width: 6px;
  height: 42px;
  border-radius: 3px;
  background: var(--ink-4);
}
.monitor-sentiment-bar.good { background: var(--accent); }
.monitor-sentiment-bar.risk { background: var(--danger); }
.monitor-sentiment-bar.neutral { background: var(--ink-4); }
.monitor-comment-stream b {
  display: block;
  overflow: hidden;
  color: var(--ink-2);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 500 12px/1.35 var(--f-sans);
}
.monitor-comment-line-head {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 5px;
}
.monitor-sentiment-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  height: 18px;
  padding: 0 6px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--ink-3);
  font: 750 10px/1 var(--f-sans);
  white-space: nowrap;
}
.monitor-sentiment-pill.good {
  border-color: var(--accent-line);
  background: var(--accent-tint);
  color: var(--accent);
}
.monitor-sentiment-pill.risk {
  border-color: color-mix(in oklch, var(--danger) 36%, var(--hairline));
  background: var(--danger-tint);
  color: var(--danger);
}
.monitor-sentiment-pill.neutral {
  border-color: var(--hairline);
  background: var(--panel);
  color: var(--ink-3);
}
.monitor-topic-chip {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  height: 18px;
  padding: 0 6px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--panel);
  color: var(--ink-3);
  font: 650 10px/1 var(--f-sans);
  white-space: nowrap;
}
.monitor-topic-chip.price_purchase,
.monitor-topic-chip.availability_delivery,
.monitor-topic-chip.safety_reliability,
.monitor-topic-chip.proof_trust,
.monitor-topic-chip.complaint_after_sales {
  border-color: color-mix(in oklab, var(--warn), transparent 70%);
  background: var(--warn-tint);
}
.monitor-topic-chip.positive_interest {
  border-color: var(--accent-line);
  background: var(--accent-tint);
}
.monitor-topic-chip.reply {
  background: var(--bg-2);
  color: var(--ink-4);
}
.monitor-comment-stream.expanded b {
  display: -webkit-box;
  white-space: normal;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.monitor-comment-stream .monitor-translation-line {
  display: -webkit-box;
  margin-top: 3px;
  overflow: hidden;
  white-space: normal;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.monitor-comment-stream small {
  display: block;
  margin-top: 2px;
  overflow: hidden;
  color: var(--ink-4);
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 500 10px/1.35 var(--f-mono);
}
.monitor-comment-stream small.monitor-comment-source {
  color: var(--ink-3);
  font-family: var(--f-sans);
}
.monitor-comment-focus a {
  color: var(--ink);
  text-decoration: none;
}
.monitor-comment-focus a:hover {
  text-decoration: underline;
}
.monitor-comment-stream em {
  color: var(--ink-4);
  font: 500 10px/1 var(--f-mono);
  font-style: normal;
  text-align: right;
}
.monitor-comment-stream em.monitor-sentiment-score.good {
  color: var(--accent);
}
.monitor-comment-stream em.monitor-sentiment-score.risk {
  color: var(--danger);
  font-weight: 700;
}
.monitor-comment-stream em.monitor-sentiment-score.neutral {
  color: var(--ink-4);
}
.monitor-response {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.monitor-comment-focus {
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.monitor-comment-focus-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.monitor-comment-focus b {
  font-size: 12px;
}
.monitor-comment-focus span {
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-2);
}
.monitor-comment-focus small {
  color: var(--ink-4);
  font: 500 10px/1.4 var(--f-mono);
}
.monitor-reply-box {
  min-height: 96px;
  resize: vertical;
  line-height: 1.55;
}
.monitor-risk-queue,
.monitor-opportunity-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.monitor-risk-queue {
  max-height: 164px;
  overflow: auto;
}
.monitor-risk-queue.expanded {
  max-height: 640px;
  padding: 12px;
}
.monitor-risk-queue button {
  display: grid;
  grid-template-columns: 5px minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  padding: 8px 9px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  text-align: left;
}
.monitor-risk-queue.expanded button {
  grid-template-columns: 5px minmax(0, 1fr) 82px;
}
.monitor-risk-queue button.active {
  border-color: color-mix(in oklch, var(--danger) 35%, var(--hairline));
  background: var(--danger-tint);
}
.monitor-risk-dot {
  width: 5px;
  height: 28px;
  border-radius: 3px;
  background: var(--danger);
}
.monitor-risk-queue b {
  display: block;
  font-size: 12px;
  font-weight: 600;
}
.monitor-risk-queue small {
  display: block;
  margin-top: 2px;
  color: var(--ink-4);
  font-size: 10px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.monitor-risk-queue p {
  display: -webkit-box;
  margin: 4px 0 0;
  overflow: hidden;
  color: var(--ink-3);
  font-size: 12px;
  line-height: 1.45;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.monitor-risk-queue em {
  color: var(--danger);
  font: 500 10px/1 var(--f-mono);
  font-style: normal;
}
.monitor-opportunity-list {
  margin-top: 8px;
}
.monitor-opportunity-list div {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  padding: 8px 9px;
  border: 1px solid var(--accent-line);
  border-radius: 6px;
  background: var(--accent-tint);
}
.monitor-opportunity-list .icon {
  color: var(--accent);
}
.monitor-opportunity-list span {
  overflow: hidden;
  color: var(--ink-2);
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}
.monitor-opportunity-list b {
  color: var(--accent);
  font: 600 10px/1 var(--f-mono);
}
@media (max-width: 1180px) {
  .monitor-workbench {
    grid-template-columns: 1fr;
  }
  .monitor-content-filter-bar {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  .monitor-search-field {
    grid-column: span 2;
  }
  .monitor-sync-log-row {
    grid-template-columns: minmax(150px, 1fr) repeat(3, 92px) minmax(140px, 1fr);
  }
  .monitor-stat-strip {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .monitor-trend-summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 760px) {
  .monitor-stat-strip,
  .monitor-filter-bar,
  .monitor-content-filter-bar,
  .monitor-work-tabs {
    grid-template-columns: 1fr;
  }
  .monitor-search-field {
    grid-column: auto;
  }
  .monitor-filter-count {
    justify-self: start;
  }
  .monitor-sync-overlay {
    padding: 12px;
  }
  .monitor-drawer-backdrop {
    padding: 0;
  }
  .monitor-trend-drawer {
    width: 100vw;
    border-radius: 0;
  }
  .monitor-trend-metric-tabs {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .monitor-trend-chart-head,
  .monitor-trend-foot {
    flex-direction: column;
    align-items: flex-start;
  }
  .monitor-sync-log-row,
  .monitor-sync-log-row.head {
    grid-template-columns: 1fr;
  }
  .monitor-sync-detail-grid {
    grid-template-columns: 1fr;
  }
}

/* Reports */
.reports-layout { grid-template-columns: 340px minmax(0, 1fr); align-items: start; }
.reports-config { display: flex; flex-direction: column; gap: 18px; }
.report-top-filter {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: end;
  gap: 16px;
  padding: 14px;
  border: 1px solid var(--hairline);
  border-radius: 8px;
  background: var(--surface);
}
.report-filter-group {
  min-width: 0;

}
.report-comment-platform-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.report-comment-platform-head b {
  display: block;
  color: var(--ink);
  font: 600 13px/1.2 var(--f-sans);
}
.report-comment-platform-head span,
.report-comment-platform-head em {
  display: block;
  margin-top: 3px;
  color: var(--ink-4);
  font: 500 10px/1.35 var(--f-mono);
  font-style: normal;
}
.report-comment-platform-head em {
  flex: 0 0 auto;
  margin-top: 0;
  color: var(--accent);
  font-weight: 600;
}
.report-comment-platform-card.empty .report-comment-platform-head em {
  color: var(--ink-4);
}
.report-comment-platform-metrics {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 7px;
}
.report-comment-keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.report-comment-keywords span {
  display: inline-flex;
  width: fit-content;
  padding: 4px 6px;
  border: 1px solid var(--hairline);
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--ink-4);
  font: 500 10px/1.2 var(--f-mono);
}
.report-comment-platform-insight {
  margin: 0;
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.6;
}
.report-comment-samples article {
  display: grid;
  gap: 6px;
  margin: 0;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-2);
  font-size: 11px;
  line-height: 1.55;
}
.report-comment-samples article > div {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}
.report-comment-samples article b {
  color: var(--accent);
  font-family: var(--f-mono);
  font-size: 10px;
}
.report-comment-samples article span {
  color: var(--ink-4);
  font: 500 10px/1.35 var(--f-mono);
  text-align: right;
}
.report-comment-samples article strong {
  color: var(--ink);
  font: 600 12px/1.35 var(--f-sans);
}
.report-comment-samples article p {
  margin: 0;
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.6;
}
.report-comment-samples article em {
  display: inline-block;
  margin-right: 7px;
  padding: 2px 5px;
  border-radius: 4px;
  background: var(--accent-tint);
  color: var(--accent);
  font: 600 10px/1.2 var(--f-mono);
  font-style: normal;
}
.report-learning-columns {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.report-content-diagnosis {
  display: grid;
  gap: 12px;
}
.report-diagnosis-hero {
  padding: 14px;
  border: 1px solid var(--accent-line);
  border-radius: 7px;
  background: var(--accent-tint);
}
.report-diagnosis-hero b,
.report-content-diagnosis h4 {
  display: block;
  margin: 0 0 7px;
  color: var(--ink);
  font: 600 12px/1.2 var(--f-mono);
}
.report-diagnosis-hero p,
.report-content-diagnosis p {
  margin: 0;
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.65;
}
.report-diagnosis-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.report-diagnosis-grid > div,
.report-column-matrix,
.report-next-directions,
.report-assumption-list {
  padding: 12px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.report-diagnosis-grid p + p,
.report-assumption-list p + p {
  margin-top: 8px;
}
.report-diagnosis-grid p b {
  display: inline-block;
  min-width: 70px;
  color: var(--accent);
  font: 600 10px/1.2 var(--f-mono);
}
.report-tone-layer {
  display: grid;
  gap: 7px;
  padding: 9px 0;
  border-top: 1px solid var(--hairline);
}
.report-tone-layer:first-of-type {
  border-top: 0;
  padding-top: 0;
}
.report-tone-layer b {
  color: var(--accent);
  font: 700 10px/1.2 var(--f-mono);
  letter-spacing: 0;
}
.report-tone-word-list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}
.report-tone-word-list span {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 2px 7px;
  border: 1px solid var(--accent-line);
  border-radius: 6px;
  background: var(--accent-tint);
  color: var(--accent);
  font: 700 15px/1.15 var(--f-serif);
}
.report-tone-layer small {
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.report-column-matrix > div {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}
.report-column-matrix article {
  min-width: 0;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--surface);
}
.report-column-matrix article b,
.report-next-directions article b {
  display: block;
  color: var(--ink);
  font-size: 12px;
  line-height: 1.35;
}
.report-column-matrix article span,
.report-next-directions article span {
  display: block;
  margin-top: 5px;
  color: var(--ink-4);
  font: 500 10px/1.35 var(--f-mono);
}
.report-column-matrix article p {
  margin-top: 7px;
  font-size: 11px;
}
.report-next-directions {
  display: grid;
  gap: 8px;
}
.report-next-directions article {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr);
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: var(--surface);
}
.report-next-directions article em {
  display: grid;
  place-items: center;
  height: 26px;
  border-radius: 5px;
  background: var(--ink);
  color: var(--bg);
  font: 700 10px/1 var(--f-mono);
  font-style: normal;
}
.report-next-directions article p {
  margin-top: 4px;
}
.report-post-table td:first-child {
  max-width: 300px;
}
.report-event-list { display: grid; gap: 8px; }
.report-event-list > div {
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 10px;
  row-gap: 4px;
  align-items: start;
}
.report-event-list b { font-size: 12px; }
.report-event-list small { grid-column: 2; color: var(--ink-4); font-size: 10px; }
.report-learning-list { display: flex; flex-wrap: wrap; gap: 8px; }
.report-learning-list span {
  padding: 6px 8px;
  border: 1px solid var(--accent-line);
  border-radius: 5px;
  background: var(--accent-tint);
  color: var(--accent);
  font-size: 11px;
}

/* Progress */
.bar {
  height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden;
}
.bar > span { display: block; height: 100%; background: var(--ink); border-radius: 2px; }
.bar.accent > span { background: var(--accent); }

/* Thinking panel */
.thinking {
  background: oklch(0.15 0.01 80);
  color: oklch(0.85 0.005 80);
  border-left: 1px solid var(--hairline);
  overflow-y: auto;
  font-family: var(--f-mono);
  font-size: 10.5px;
  display: flex; flex-direction: column;
}
.thinking-header {
  padding: 10px 12px;
  border-bottom: 1px solid oklch(0.25 0.008 80);
  display: flex; align-items: center; gap: 8px;
  position: sticky; top: 0; background: oklch(0.15 0.01 80);
  z-index: 2;
}
.thinking-header h3 {
  margin: 0; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
  color: oklch(0.85 0.005 80); font-weight: 500;
}
.thinking-header .orb {
  width: 7px; height: 7px; border-radius: 50%;
  background: oklch(0.75 0.15 155);
  box-shadow: 0 0 8px oklch(0.75 0.15 155);
  animation: pulse 1.4s ease-in-out infinite;
}
.thinking-body {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.think-line {
  display: flex; gap: 6px; flex-wrap: wrap;
  animation: slideFade 0.3s ease-out;
  padding: 2px 0;
  line-height: 1.45;
  font-size: 10.5px;
}
.think-line .t { color: oklch(0.55 0.008 80); font-size: 9.5px; }
.think-line .src { color: oklch(0.75 0.12 155); font-size: 9.5px; }
.think-line .msg { color: oklch(0.85 0.005 80); flex: 1 1 100%; padding-top: 1px; }
.think-line.warn .msg { color: oklch(0.8 0.14 60); }
.think-line.ok .msg { color: oklch(0.8 0.14 155); }
.think-line.head {
  color: oklch(0.95 0.005 80);
  margin-top: 8px;
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
}
.think-line.head b {
  color: oklch(0.8 0.14 155);
  font-weight: 500;
  text-align: right;
}
.think-line.head .msg { color: oklch(0.95 0.005 80); }
@keyframes slideFade {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}

.think-status {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid oklch(0.25 0.008 80);
  display: flex; align-items: center; gap: 8px;
  color: oklch(0.65 0.006 80);
  font-size: 10px;
  background: oklch(0.15 0.01 80);
  position: sticky; bottom: 0;
}
.think-status .stat-dot {
  width: 6px; height: 6px; border-radius: 50%; background: oklch(0.7 0.14 155);
  animation: pulse 1.2s ease-in-out infinite;
}

/* Thinking toggle (when panel hidden) */
.thinking-fab {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--ink); color: var(--bg);
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-family: var(--f-mono);
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.thinking-fab .orb { width: 6px; height: 6px; border-radius: 50%; background: oklch(0.75 0.15 155); animation: pulse 1.4s ease-in-out infinite; }

/* Tag */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 4px;
  font-size: 11px;
  color: var(--ink-2);
}
.tag.accent { background: var(--accent-tint); border-color: var(--accent-line); color: var(--accent); }
.tag.mono { font-family: var(--f-mono); font-size: 10px; }

/* Market sensing */
.market-sensing-page .segmented {
  width: 100%;
}
.market-window-control {
  width: 240px;
}
.market-counter-grid {
  grid-template-columns: repeat(5, minmax(0, 1fr));
}
.market-focus-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.market-focus-card {
  display: grid;
  grid-template-columns: 48px minmax(0, 1fr);
  grid-template-rows: auto auto;
  gap: 2px 10px;
  align-items: center;
  padding: 12px;
  text-align: left;
  color: var(--ink);
}
.market-focus-card.active {
  border-color: var(--accent-line);
  background: var(--accent-tint);
}
.market-focus-card b {
  grid-row: 1 / span 2;
  font: 700 24px/1 var(--f-display);
  color: var(--ink);
}
.market-focus-card span {
  min-width: 0;
  color: var(--ink-2);
  font-size: 12px;
  font-weight: 700;
}
.market-focus-card small {
  min-width: 0;
  color: var(--ink-4);
  font-size: 11px;
  line-height: 1.35;
}
.market-tabs-card .card-body {
  padding: 8px;
}
.market-view-tabs {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.market-view-tabs button {
  height: 32px;
}
.market-learning-card .card-body {
  display: grid;
  gap: 12px;
}
.market-learning-principle {
  padding: 12px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-learning-principle b {
  display: block;
  color: var(--ink);
  font-size: 13px;
}
.market-learning-principle p {
  margin: 6px 0 0;
  color: var(--ink-3);
  font-size: 12px;
  line-height: 1.55;
}
.market-learning-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 9px;
}
.market-learning-priority {
  min-width: 0;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--surface);
}
.market-learning-priority.p1,
.market-learning-priority.p2 {
  border-color: var(--accent-line);
  background: var(--accent-tint);
}
.market-learning-priority.p5 {
  border-color: color-mix(in oklch, var(--warn) 30%, var(--hairline));
  background: var(--warn-tint);
}
.market-learning-head {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
}
.market-learning-head b {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}
.market-learning-priority > p {
  min-height: 47px;
  margin: 7px 0 9px;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.market-learning-cases {
  display: grid;
  gap: 7px;
}
.market-learning-case {
  display: grid;
  gap: 5px;
  width: 100%;
  padding: 8px;
  border: 1px solid var(--hairline);
  border-radius: 6px;
  background: color-mix(in oklch, var(--surface) 84%, var(--bg));
  color: var(--ink);
  text-align: left;
  cursor: pointer;
}
.market-learning-case:hover {
  border-color: var(--accent-line);
  background: var(--surface);
}
.market-learning-case div:first-child {
  display: grid;
  gap: 2px;
}
.market-learning-case b {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--ink);
  font-size: 11px;
}
.market-learning-case > div:first-child span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 9.5px;
}
.market-learning-case small {
  color: var(--ink-3);
  font-size: 10.5px;
  line-height: 1.4;
}
.market-learning-notes {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.market-learning-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  min-width: 0;
  padding: 9px 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
  color: var(--ink-2);
  font-size: 11px;
  line-height: 1.45;
}
.market-learning-note .icon {
  flex: 0 0 auto;
  color: var(--accent);
}
.market-case-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  justify-content: flex-end;
  background: color-mix(in oklch, var(--ink) 16%, transparent);
}
.market-case-drawer {
  width: min(720px, 100vw);
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--hairline);
  box-shadow: var(--shadow-lg);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}
.market-case-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding: 18px;
  border-bottom: 1px solid var(--hairline);
  background: var(--bg);
}
.market-case-header h3 {
  margin: 8px 0 4px;
  color: var(--ink);
  font-size: 18px;
}
.market-case-header p {
  margin: 0;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-case-header .btn {
  padding: 7px;
  min-width: 32px;
}
.market-case-body {
  display: grid;
  gap: 14px;
  align-content: start;
  min-height: 0;
  overflow-y: auto;
  padding: 16px 18px 22px;
}
.market-case-body section {
  display: grid;
  gap: 9px;
}
.market-case-body h4 {
  margin: 0;
  color: var(--ink);
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.market-case-summary {
  padding: 13px;
  border: 1px solid var(--accent-line);
  border-radius: 7px;
  background: var(--accent-tint);
}
.market-case-summary b {
  display: block;
  color: var(--ink);
  font-size: 13px;
  line-height: 1.45;
}
.market-case-summary p,
.market-case-list p {
  margin: 7px 0 0;
  color: var(--ink-3);
  font-size: 11.5px;
  line-height: 1.55;
}
.market-case-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.market-case-stat {
  min-width: 0;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-case-stat span {
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-case-stat b {
  display: block;
  margin-top: 4px;
  color: var(--ink);
  font-size: 12px;
  overflow-wrap: anywhere;
}
.market-case-bars {
  display: grid;
  gap: 8px;
}
.market-case-bar {
  display: grid;
  gap: 5px;
}
.market-case-bar > div {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: var(--ink-3);
  font-size: 11px;
}
.market-case-bar b {
  color: var(--ink);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-case-bar i {
  height: 5px;
  overflow: hidden;
  border-radius: 999px;
  background: var(--bg-2);
}
.market-case-bar em {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
}
.market-case-list {
  display: grid;
  gap: 8px;
}
.market-case-list article {
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-case-list.compact article {
  padding: 9px 10px;
}
.market-case-list article.warn {
  border-color: color-mix(in oklch, var(--warn) 30%, var(--hairline));
  background: var(--warn-tint);
}
.market-case-list b {
  color: var(--ink);
  font-size: 12px;
  line-height: 1.35;
}
.market-case-checks {
  display: grid;
  gap: 7px;
}
.market-case-checks div {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 8px 9px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
  color: var(--ink-2);
  font-size: 11.5px;
  line-height: 1.45;
}
.market-case-checks .icon {
  flex: 0 0 auto;
  color: var(--accent);
}
.skeleton-line {
  height: 12px;
  max-width: 520px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--bg-2), var(--hairline), var(--bg-2));
  background-size: 220% 100%;
  animation: skeletonPulse 1.25s ease-in-out infinite;
}
.skeleton-line.short {
  max-width: 300px;
}
@keyframes skeletonPulse {
  from { background-position: 0 0; }
  to { background-position: -220% 0; }
}
.market-filter-bar {
  display: grid;
  grid-template-columns: minmax(330px, 0.95fr) minmax(310px, 0.85fr) 150px minmax(220px, 0.7fr) auto;
  align-items: center;
  gap: 10px;
}
.market-type-control {
  grid-template-columns: repeat(6, minmax(0, 1fr));
}
.market-focus-control {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.market-platform-select {
  height: 30px;
}
.market-signal-search .input {
  height: 30px;
}
.market-signal-row {
  width: 100%;
  display: grid;
  grid-template-columns: 64px 142px 64px minmax(0, 1fr) 82px;
  gap: 12px;
  padding: 12px 14px;
  text-align: left;
  background: var(--surface);
  border-radius: 0;
  color: var(--ink);
}
.market-signal-row:hover,
.market-signal-row.active {
  background: var(--bg-2);
}
.market-signal-row.active {
  box-shadow: inset 3px 0 0 var(--accent);
}
.market-signal-time {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding-top: 2px;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-signal-time b {
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 600;
}
.market-brand-cell {
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr);
  grid-template-rows: auto auto;
  align-items: center;
  gap: 2px 8px;
  min-width: 0;
}
.market-brand-logo {
  grid-row: 1 / span 2;
  width: 34px;
  height: 34px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  border: 1px solid var(--hairline);
  background: var(--bg-2);
  color: var(--ink);
  font: 700 10px/1 var(--f-mono);
  letter-spacing: 0;
}
.market-brand-logo.red {
  background: color-mix(in oklch, var(--danger) 16%, var(--surface));
  color: var(--danger);
  border-color: color-mix(in oklch, var(--danger) 30%, var(--hairline));
}
.market-brand-logo.green {
  background: var(--accent-tint);
  color: var(--accent);
  border-color: var(--accent-line);
}
.market-brand-logo.blue {
  background: var(--info-tint);
  color: var(--info);
  border-color: color-mix(in oklch, var(--info) 30%, var(--hairline));
}
.market-brand-logo.bronze {
  background: var(--warn-tint);
  color: var(--warn);
  border-color: color-mix(in oklch, var(--warn) 34%, var(--hairline));
}
.market-brand-logo.dark {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.market-brand-cell > span:not(.market-brand-logo) {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 600;
}
.market-brand-cell small {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 9px;
}
.market-signal-copy {
  min-width: 0;
}
.market-signal-title {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
}
.market-signal-title b {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 600;
}
.market-signal-copy p {
  margin: 3px 0 0;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.market-signal-themes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.market-score-cell {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.market-score-cell b {
  margin-top: 3px;
  font: 400 22px/1 var(--f-serif);
}
.market-score-cell small,
.market-action-item small,
.market-source-row span,
.market-source-row small {
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-evidence-layout {
  grid-template-columns: minmax(0, 1.24fr) minmax(360px, 0.86fr);
  align-items: start;
}
.market-evidence-list {
  display: grid;
  max-height: min(920px, calc(100vh - 260px));
  overflow-y: auto;
}
.market-evidence-row {
  display: grid;
  gap: 10px;
  width: 100%;
  padding: 13px 14px;
  border-radius: 0;
  background: var(--surface);
  color: var(--ink);
  text-align: left;
}
.market-evidence-row:hover,
.market-evidence-row.active {
  background: var(--bg-2);
}
.market-evidence-row.active {
  box-shadow: inset 3px 0 0 var(--accent);
}
.market-evidence-head {
  display: grid;
  grid-template-columns: 160px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
}
.market-evidence-meta {
  display: flex;
  justify-content: flex-end;
  gap: 5px;
  min-width: 0;
  flex-wrap: wrap;
}
.market-evidence-raw {
  margin: 0;
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.market-evidence-side {
  display: grid;
  gap: 12px;
  align-content: start;
}
.market-raw-detail {
  display: grid;
  gap: 11px;
}
.market-raw-source {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr);
  gap: 9px;
  align-items: center;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-raw-source b {
  color: var(--ink);
  font-size: 12px;
}
.market-raw-source p {
  margin: 3px 0 0;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}
.market-source-link {
  width: fit-content;
  color: var(--accent);
  font-family: var(--f-mono);
  font-size: 10px;
  text-decoration: none;
}
.market-source-link:hover {
  text-decoration: underline;
}
.market-raw-block {
  padding: 12px;
  border: 1px solid var(--accent-line);
  border-radius: 7px;
  background: var(--accent-tint);
}
.market-raw-block span,
.market-derivation-step span {
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-raw-block p {
  margin: 7px 0 0;
  color: var(--ink);
  font-size: 13px;
  line-height: 1.6;
}
.market-derivation-list {
  display: grid;
  gap: 7px;
}
.market-derivation-step {
  padding: 9px 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-derivation-step p {
  margin: 4px 0 0;
  color: var(--ink-2);
  font-size: 11.5px;
  line-height: 1.45;
}
.market-evidence-evidence {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.market-action-item {
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-action-item.active {
  border-color: var(--accent-line);
  background: var(--accent-tint);
}
.market-action-item b {
  font-size: 12px;
}
.market-action-item p {
  margin: 6px 0 5px;
  color: var(--ink-2);
  font-size: 11px;
  line-height: 1.45;
}
.market-object-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 9px;
}
.market-object-card {
  min-height: 124px;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-object-card.media,
.market-object-card.category {
  border-color: var(--accent-line);
}
.market-object-card.risk {
  border-color: color-mix(in oklch, var(--danger) 34%, var(--hairline));
  background: var(--danger-tint);
}
.market-object-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.market-object-head b {
  font-size: 12px;
}
.market-object-head span {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--surface);
  border: 1px solid var(--hairline);
  font: 600 11px/1 var(--f-mono);
}
.market-object-card p,
.market-output-item p {
  margin: 7px 0 0;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.market-output-list {
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.market-output-item {
  position: relative;
  min-height: 92px;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-output-item.urgent {
  border-color: color-mix(in oklch, var(--danger) 34%, var(--hairline));
  background: var(--danger-tint);
}
.market-output-item.ready {
  border-color: var(--accent-line);
}
.market-output-item > div {
  display: flex;
  align-items: center;
  gap: 7px;
  padding-right: 72px;
}
.market-output-item b {
  font-size: 12px;
}
.market-output-item > .chip {
  position: absolute;
  right: 10px;
  top: 10px;
}
.market-review-list {
  display: grid;
  gap: 8px;
}
.market-review-item {
  padding: 10px;
  border: 1px solid color-mix(in oklch, var(--danger) 26%, var(--hairline));
  border-radius: 7px;
  background: var(--danger-tint);
}
.market-review-item > div {
  display: flex;
  align-items: center;
  gap: 7px;
}
.market-review-item b {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}
.market-review-item p,
.market-context-pack p,
.market-empty-state {
  margin: 7px 0 0;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.market-review-item p {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.market-review-item small {
  display: block;
  margin-top: 6px;
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-review-actions {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
  margin-top: 9px;
}
.market-review-actions .btn {
  justify-content: center;
  min-width: 0;
}
.market-correction-form {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
  margin-top: 9px;
  padding: 9px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--surface);
}
.market-correction-form label {
  display: grid;
  gap: 4px;
}
.market-correction-form label span {
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 9px;
  text-transform: uppercase;
}
.market-correction-form .input {
  height: 30px;
  font-size: 11px;
}
.market-action-status {
  padding: 8px 10px;
  border: 1px solid var(--accent-line);
  border-radius: 7px;
  background: var(--accent-tint);
  color: var(--accent);
  font-family: var(--f-mono);
  font-size: 10px;
}
.market-empty-state {
  margin: 0;
  padding: 12px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-context-pack {
  display: grid;
  gap: 10px;
}
.market-context-pack p {
  margin: 0;
}
.strategy-market-input p {
  margin: 0;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}
.market-source-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 140px 36px;
  gap: 10px;
  align-items: center;
  padding: 9px 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-source-row b {
  display: block;
  font-size: 12px;
}
.market-source-row .bar {
  height: 5px;
}
.market-source-row small {
  text-align: right;
}
.market-pipeline {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}
.market-pipeline-step {
  min-height: 112px;
  padding: 10px;
  border: 1px solid var(--hairline);
  border-radius: 7px;
  background: var(--bg-2);
}
.market-pipeline-step.done {
  border-color: var(--accent-line);
}
.market-pipeline-step.active {
  border-color: color-mix(in oklch, var(--info) 35%, var(--hairline));
  background: var(--info-tint);
}
.market-pipeline-step span {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-4);
}
.market-pipeline-step b {
  display: block;
  margin-top: 8px;
  font-size: 12px;
}
.market-pipeline-step p {
  margin: 5px 0 0;
  color: var(--ink-3);
  font-size: 11px;
  line-height: 1.45;
}

/* Toggle & inputs */
.input {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  padding: 5px 9px;
  font-size: 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.input:focus { border-color: var(--ink-3); box-shadow: 0 0 0 3px var(--focus-ring); }
.search { position: relative; }
.search .input { padding-left: 26px; }
.search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--ink-4); }

/* Divider */
.hr { height: 1px; background: var(--hairline); border: 0; margin: 0; }

/* Editorial callout */
.callout {
  padding: 14px 16px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  font-family: var(--f-serif);
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.callout small {
  display: block;
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.08em;
  margin-top: 8px;
}

/* Scrollbar */
.main::-webkit-scrollbar, .sidebar::-webkit-scrollbar, .thinking::-webkit-scrollbar { width: 8px; height: 8px; }
.main::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb { background: var(--hairline-2); border-radius: 4px; }
.thinking::-webkit-scrollbar-thumb { background: oklch(0.3 0.008 80); border-radius: 4px; }

/* Row of tiny icons */
.icon { width: 14px; height: 14px; flex-shrink: 0; }
.icon.sm { width: 12px; height: 12px; }
.icon.md { width: 16px; height: 16px; }

/* Step pill */
.steps { display: flex; gap: 4px; align-items: center; }
.step-pill {
  font-family: var(--f-mono); font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--bg-2);
  color: var(--ink-3);
  border: 1px solid var(--hairline);
}
.step-pill.done { background: oklch(0.96 0.03 155); border-color: var(--accent-line); color: var(--accent); }
.step-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* Shine effect on active / processing items */
.shine {
  position: relative; overflow: hidden;
}
.shine::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.5), transparent);
  animation: shineMove 2s ease-in-out infinite;
}
@keyframes shineMove {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

/* Utility */
.muted { color: var(--ink-3); }
.mono { font-family: var(--f-mono); }
.serif { font-family: var(--f-serif); }
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.spacer { flex: 1; }
.sep { color: var(--ink-4); }

/* Longform Agent */
.longform-steps {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.longform-workbench {
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  align-items: start;
}
.longform-workbench > .col:first-child {
  position: sticky;
  top: 56px;
  align-self: start;
  max-height: calc(100vh - 76px);
  overflow-y: auto;
  padding-right: 4px;
  padding-bottom: 16px;
  overscroll-behavior: contain;
}
.longform-policy-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.longform-policy-card .metric .spark {
  display: none;
}
.longform-task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.longform-task-row {
  display: grid;
  grid-template-columns: minmax(320px, 1.5fr) minmax(280px, 0.9fr) minmax(190px, 0.65fr);
  gap: 14px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 11px 12px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.longform-task-row:hover {
  background: var(--bg-2);
  border-color: var(--hairline-2);
}
.longform-task-main {
  display: grid;
  grid-template-columns: max-content minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  min-width: 0;
}
.longform-task-main h3 {
  margin: 0 0 4px;
  font-family: var(--f-serif);
  font-size: 17px;
  font-weight: 400;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.longform-task-main p {
  margin: 0;
  color: var(--ink-3);
  font-size: 11.5px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.longform-task-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
}
.longform-task-meta span {
  padding: 5px 7px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.longform-task-status {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: flex-end;
}
.longform-guardrail-list {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-top: 14px;
}
.longform-guardrail,
.longform-policy-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 9px 10px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 7px;
}
.longform-guardrail.is-disabled,
.longform-policy-row.is-disabled {
  opacity: 0.55;
}
.longform-guardrail.is-disabled b,
.longform-policy-row.is-disabled b {
  text-decoration: line-through;
}
.longform-guardrail svg { color: var(--accent); margin-top: 2px; }
.longform-guardrail div,
.longform-policy-row div:first-child {
  min-width: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.longform-guardrail b,
.longform-policy-row b {
  font-size: 12px;
  color: var(--ink);
}
.longform-guardrail span,
.longform-policy-row span {
  font-size: 10.5px;
  color: var(--ink-4);
  line-height: 1.45;
}
.longform-guardrail-maintenance {
  margin-top: 14px;
  padding: 12px;
  border: 1px solid var(--hairline-2);
  border-radius: 8px;
  background: var(--surface);
}
.longform-maintenance-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--hairline);
}
.longform-maintenance-head b {
  display: block;
  font-size: 13px;
  color: var(--ink);
}
.longform-maintenance-head span {
  display: block;
  margin-top: 3px;
  color: var(--ink-4);
  font-size: 11px;
}
.longform-maintenance-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 12px;
  margin-top: 12px;
}
.longform-profile-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.longform-profile-summary > div {
  display: flex;
  min-width: 0;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 8px;
}
.longform-profile-summary b {
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.longform-profile-summary p {
  min-height: 32px;
  margin: 0;
  color: var(--ink-4);
  font-size: 11px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.longform-maintenance-natural {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}
.longform-maintenance-natural textarea {
  min-height: 92px;
  resize: vertical;
}
.longform-maintenance-current {
  max-height: 286px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.longform-maintenance-rule {
  display: grid;
  gap: 4px;
  padding: 8px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 7px;
}
.longform-maintenance-rule.is-disabled {
  opacity: 0.55;
}
.longform-maintenance-rule b {
  font-size: 12px;
}
.longform-maintenance-rule p,
.longform-draft-preview p {
  margin: 0;
